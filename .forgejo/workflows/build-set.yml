# Heavy package-set builds: a 'detect' job maps the changed files to
# ci-build.sh set names (etc/ci-changed-sets.sh) and 'build' fans out over
# exactly those sets -- touching bitcoin/packages/explorers.scm builds the
# explorers set, not everything.  Or dispatch one set manually:
#   fj actions dispatch build-set.yml -f package_set=<light|nodes|indexers|wallets|lightning|rust|explorers|all>
# Restores the Guix cache produced by check.yml's setup-guix job.
name: build-set
on:
  push:
    branches: [master]
    paths:
      - "bitcoin/packages/**"
      - "bitcoin/build/**"
      - "etc/ci-packages.scm"
      - "etc/ci-build.sh"
      - "etc/ci-changed-sets.sh"
  workflow_dispatch:
    inputs:
      package_set:
        description: "Package set to build (ci-build.sh set name)"
        required: false
        default: "nodes"

jobs:
  detect:
    # Decide which sets to build.  Needs git + jq (provided by the runner
    # image), not Guix.
    runs-on: docker
    outputs:
      sets: ${{ steps.detect.outputs.sets }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            names="${{ inputs.package_set }}"
          else
            before='${{ github.event.before }}'
            if printf '%s' "$before" | grep -qE '^0+$'; then
              changed=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
            else
              changed=$(git diff --name-only "$before" "${{ github.sha }}")
            fi
            names=$(printf '%s\n' "$changed" | ./etc/ci-changed-sets.sh)
          fi
          # Expand the umbrella "all" into concrete sets so the build
          # matrix runs them in parallel (one sequential "all" job would
          # exceed the per-job timeout).
          case " $names " in
            *" all "*) names="light nodes wallets indexers lightning rust explorers" ;;
          esac
          echo "selected sets: ${names:-(none)}"
          sets=$(printf '%s\n' $names | jq -R . | jq -sc 'map(select(length > 0))')
          echo "sets=$sets" >> "$GITHUB_OUTPUT"

  build:
    needs: detect
    if: ${{ needs.detect.outputs.sets != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        set: ${{ fromJSON(needs.detect.outputs.sets) }}
    # "docker" is a SELF-HOSTED runner label: bitcoin-core-class builds
    # exceed Codeberg's shared-runner limits (codeberg-medium = 4 CPU /
    # 8 GB / 10 min; -lazy variants relax time but not resources).
    # Register a runner on your own hardware:
    #   https://codeberg.org/trevarj/guix-bitcoin/settings/actions/runners
    #   forgejo-runner register --labels docker:docker://node:20-bookworm
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache/restore@v4
        with:
          path: |
            /gnu
            /var/guix
            /root/.config/guix
            /root/.cache/guix
          key: guix-${{ hashFiles('etc/ci-guix-channels.scm', 'etc/ci-setup-guix.sh') }}
      - name: Ensure Guix and build package set
        run: |
          ./etc/ci-setup-guix.sh ensure
          ./etc/ci-build.sh "${{ matrix.set }}"
