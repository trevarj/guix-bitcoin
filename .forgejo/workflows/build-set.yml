# Heavy package-set builds: run when package modules change, or dispatch
# manually with a chosen set:
#   fj actions dispatch build-set.yml -f package_set=<light|nodes|indexers|wallets|lightning|rust|explorers|all>
# Restores the Guix cache produced by check.yml's setup-guix job.
name: build-set
on:
  push:
    branches: [master]
    paths:
      - "bitcoin/packages/**"
      - "etc/ci-packages.scm"
  workflow_dispatch:
    inputs:
      package_set:
        description: "Package set to build (ci-build.sh set name)"
        required: false
        default: "nodes"

jobs:
  build:
    # "docker" is a SELF-HOSTED runner label: bitcoin-core-class builds
    # exceed Codeberg's shared-runner limits (codeberg-medium = 4 CPU /
    # 8 GB / 10 min; -lazy variants relax time but not resources).
    # Register a runner on your own hardware:
    #   https://codeberg.org/trevarj/guix-bitcoin/settings/actions/runners
    #   forgejo-runner register --labels docker:docker://node:20-bookworm
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache/restore@v4
        with:
          path: |
            /gnu
            /var/guix
            /root/.config/guix
            /root/.cache/guix
          key: guix-${{ hashFiles('etc/ci-guix-channels.scm', 'etc/ci-setup-guix.sh') }}
      - name: Ensure Guix and build package set
        run: |
          ./etc/ci-setup-guix.sh ensure
          ./etc/ci-build.sh "${{ inputs.package_set || 'nodes' }}"
