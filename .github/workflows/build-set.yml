# GitHub Actions mirror of .forgejo/workflows/build-set.yml.
# Heavy package-set builds on free public runners (6 h job limit fits
# bitcoin-core incl. functional tests).  Dispatch:
#   gh workflow run build-set.yml -f package_set=<set>
# Sets: light|nodes|indexers|wallets|lightning|rust|explorers|all
name: build-set
on:
  push:
    branches: [master]
    paths:
      - "btc/packages/**"
      - "etc/ci-packages.scm"
  workflow_dispatch:
    inputs:
      package_set:
        description: "Package set to build (ci-build.sh set name)"
        required: false
        default: "nodes"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache/restore@v4
        with:
          path: |
            /gnu
            /var/guix
            /root/.config/guix
            /root/.cache/guix
          key: guix-${{ hashFiles('etc/ci-guix-channels.scm', 'etc/ci-setup-guix.sh') }}
      - name: Ensure Guix (no-op on cache hit)
        run: ./etc/ci-setup-guix.sh ensure
      - name: Build package set
        run: ./etc/ci-build.sh "${{ inputs.package_set || 'nodes' }}"
