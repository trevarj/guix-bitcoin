# Heavy node builds: run when the nodes module changes, or trigger
# manually (optionally with PACKAGE_SET=light|nodes|all).
when:
  - event: [push]
    path:
      include: ["btc/packages/nodes.scm", "btc/packages/indexers.scm",
                "btc/packages/lightning.scm", "btc/packages/wallets.scm",
                "btc/packages/rust-bitcoin.scm", "btc/packages/rust-crates.scm",
                "etc/ci-packages.scm"]
  - event: manual

steps:
  build-nodes:
    image: metacall/guix:latest
    commands:
      - ./etc/ci-build.sh "${PACKAGE_SET:-nodes}"
